version: '3.8'

services:
  # 1. База метаданных: PostgreSQL
  postgres:
    image: postgres:15.6-alpine
    container_name: yolo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yolo_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Очередь задач: Redis
  redis:
    image: redis:7.2.4-alpine
    container_name: yolo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 3. S3 Хранилище: MinIO
  minio:
    image: minio/minio:RELEASE.2024-06-26T01-06-18Z
    container_name: yolo_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "9000:9000" 
      - "9001:9001" 
    volumes:
      - minio_data:/data

# 4. Наш микросервис компьютерного зрения
  cv_worker:
    build: 
      context: . # [ФУНДАМЕНТАЛЬНО]: Контекст теперь от корня всего проекта
      dockerfile: ./src/cv_worker/Dockerfile
    container_name: yolo_worker
    restart: unless-stopped
    depends_on:
      - redis
      - minio
    environment:
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password123
      - S3_BUCKET_NAME=media-bucket
      - ONNX_MODEL_PATH=/app/models/best.onnx


  # 5. Наш бэкенд (FastAPI)
  api:
    build:
      context: .
      dockerfile: ./src/api/Dockerfile
    container_name: yolo_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:                      # <-- ДОБАВЬ ЭТО
      - ./src/api:/app/api        # <-- ДОБАВЬ ЭТО
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password@postgres:5432/yolo_db
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password123
      - S3_BUCKET_NAME=media-bucket

  # 6. Наш Next.js Фронтенд
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: yolo_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      # Внутри Docker-сети фронтенд (на этапе SSR) будет обращаться к API по имени контейнера
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

volumes:
  pg_data:
  minio_data: